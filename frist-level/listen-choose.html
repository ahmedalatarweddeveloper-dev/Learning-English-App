<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة اسمع واختار</title>
    <style>
        :root {
            --primary: #9b59b6;
            --success: #2ecc71;
            --danger: #e74c3c;
            --bg: #fdfefe;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .title { color: #2c3e50; font-size: 1.6rem; margin-bottom: 20px; text-align: center; }

        /* زر السماعة الكبير */
        .audio-container {
            background: white;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(155, 89, 182, 0.2);
            cursor: pointer;
            margin-bottom: 40px;
            border: 8px solid #f3e5f5;
            transition: 0.3s;
        }

        .audio-container:active { transform: scale(0.9); }
        .audio-container::after { content: "🔊"; font-size: 5rem; }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 350px;
        }

        .letter-card {
            background: white;
            border: 4px solid #eee;
            border-radius: 20px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-weight: bold;
            color: #444;
            cursor: pointer;
            transition: 0.3s;
        }

        .correct { background-color: var(--success) !important; color: white !important; border-color: #27ae60 !important; }
        .wrong { background-color: var(--danger) !important; color: white !important; border-color: #c0392b !important; animation: shake 0.5s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .btn-hint {
            margin-top: 40px;
            padding: 12px 30px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1 class="title">اسمع الصوت واختار الحرف الصح 🎧</h1>

    <div class="audio-container" id="playAudio" title="اضغط لتسمع"></div>

    <div class="options-grid" id="options">
        </div>

    <button class="btn-hint" onclick="initGame()">تغيير الحرف 🔁</button>

    <script>
        const alphabet = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L', 'M', 'N'];
        let correctLetter = '';

        function initGame() {
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';

            // 1. اختيار حرف عشوائي ليكون هو الإجابة الصحيحة
            correctLetter = alphabet[Math.floor(Math.random() * alphabet.length)];

            // 2. تشغيل الصوت فوراً عند البدء
            setTimeout(() => { speak(correctLetter); }, 500);

            // 3. تجهيز 4 خيارات (1 صح و 3 غلط)
            let choices = [correctLetter];
            while (choices.length < 4) {
                let randomChar = alphabet[Math.floor(Math.random() * alphabet.length)];
                if (!choices.includes(randomChar)) choices.push(randomChar);
            }
            choices.sort(() => 0.5 - Math.random());

            // 4. رسم البطاقات
            choices.forEach(char => {
                const card = document.createElement('div');
                card.className = 'letter-card';
                card.innerText = char;
                card.onclick = () => checkAnswer(card, char);
                optionsDiv.appendChild(card);
            });
        }

        function checkAnswer(element, selectedChar) {
            if (selectedChar === correctLetter) {
                element.classList.add('correct');
                speak(selectedChar);
                setTimeout(() => {
                    alert("ممتاز! 🌟");
                    initGame();
                }, 300);
            } else {
                element.classList.add('wrong');
                setTimeout(() => {
                    alert("أعد المحاولة 🔄");
                    element.classList.remove('wrong');
                }, 300);
            }
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'en-US';
                msg.rate = 0.8; // إبطاء السرعة قليلاً لتناسب ذوي الإعاقة الفكرية
                window.speechSynthesis.speak(msg);
            }
        }

        // تفعيل زر السماعة عند الضغط عليه
        document.getElementById('playAudio').addEventListener('click', () => {
            speak(correctLetter);
        });
         // اضف هذا السطر في أول الدالة التي تشغل الصوت
        window.speechSynthesis.getVoices(); 

        window.onload = initGame;
    </script>
</body>
</html>
