<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>لعبة صح أم خطأ؟</title>
    <style>
        :root {
            --primary: #607d8b;
            --success: #2ecc71;
            --danger: #e74c3c;
            --bg: #fdfefe;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            margin: 0;
            user-select: none;
        }

        .main-title { color: #263238; font-size: 1.6rem; margin: 10px 0; }

        /* منطقة العرض */
        .display-card {
            background: white;
            width: 90%;
            max-width: 350px;
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
            border: 2px solid #eee;
        }

        .image-box { font-size: 7rem; margin-bottom: 10px; }
        .word-box { 
            font-size: 2.5rem; 
            font-weight: bold; 
            color: #333; 
            background: #f1f8e9;
            padding: 5px 25px;
            border-radius: 15px;
            border: 2px solid #dcedc8;
        }

        /* أزرار القرار */
        .actions {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 350px;
            margin-top: 20px;
        }

        .btn-choice {
            flex: 1;
            height: 100px;
            border-radius: 20px;
            border: none;
            font-size: 3rem;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-true { background-color: var(--success); box-shadow: 0 6px 0 #27ae60; }
        .btn-false { background-color: var(--danger); box-shadow: 0 6px 0 #c0392b; }
        
        .btn-choice:active { transform: translateY(4px); box-shadow: none; }

        .btn-next {
            margin-top: 40px;
            padding: 15px 45px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1 class="main-title">هل الكلمة صحيحة؟ 🤔</h1>
    
    <div class="display-card">
        <div class="image-box" id="pic">🍎</div>
        <div class="word-box" id="txt">Apple</div>
    </div>

    <div class="actions">
        <button class="btn-choice btn-true" onclick="check(true)">✔️</button>
        <button class="btn-choice btn-false" onclick="check(false)">✖️</button>
    </div>

    <button class="btn-next" onclick="initGame()">تغيير السؤال 🔁</button>

    <script>
        // الـ 40 كلمة الموحدة
        const unifiedLibrary = [
            { word: 'Apple', img: '🍎' }, { word: 'Cat', img: '🐱' }, { word: 'Dog', img: '🐶' }, { word: 'Car', img: '🚗' },
            { word: 'Boy', img: '👦' }, { word: 'Fish', img: '🐟' }, { word: 'Tree', img: '🌳' }, { word: 'Book', img: '📖' },
            { word: 'Ball', img: '⚽' }, { word: 'House', img: '🏠' }, { word: 'Sun', img: '☀️' }, { word: 'Moon', img: '🌙' },
            { word: 'Bird', img: '🐦' }, { word: 'Milk', img: '🥛' }, { word: 'Egg', img: '🥚' }, { word: 'Cake', img: '🍰' },
            { word: 'Hand', img: '✋' }, { word: 'Eye', img: '👁️' }, { word: 'Foot', img: '🦶' }, { word: 'Nose', img: '👃' },
            { word: 'Lion', img: '🦁' }, { word: 'Monkey', img: '🐒' }, { word: 'Rabbit', img: '🐰' }, { word: 'Bear', img: '🐻' },
            { word: 'Banana', img: '🍌' }, { word: 'Orange', img: '🍊' }, { word: 'Grapes', img: '🍇' }, { word: 'Corn', img: '🌽' },
            { word: 'Plane', img: '✈️' }, { word: 'Bike', img: '🚲' }, { word: 'Bus', img: '🚌' }, { word: 'Ship', img: '🚢' },
            { word: 'Bed', img: '🛏️' }, { word: 'Chair', img: '🪑' }, { word: 'Door', img: '🚪' }, { word: 'Key', img: '🔑' },
            { word: 'Pen', img: '🖊️' }, { word: 'Star', img: '⭐' }, { word: 'Flower', img: '🌸' }, { word: 'Water', img: '💧' }
        ];

        let isCorrectMatch = false;

        function initGame() {
            const pic = document.getElementById('pic');
            const txt = document.getElementById('txt');

            // 1. اختيار عنصر عشوائي للصورة
            let randomItem = unifiedLibrary[Math.floor(Math.random() * unifiedLibrary.length)];
            pic.innerHTML = randomItem.img;

            // 2. بنسبة 50% نطلع الكلمة صح وبنسبة 50% نطلع كلمة غلط
            if (Math.random() > 0.5) {
                txt.innerHTML = randomItem.word;
                isCorrectMatch = true;
            } else {
                let wrongItem;
                do {
                    wrongItem = unifiedLibrary[Math.floor(Math.random() * unifiedLibrary.length)];
                } while (wrongItem.word === randomItem.word);
                txt.innerHTML = wrongItem.word;
                isCorrectMatch = false;
            }
            
            // نطق الكلمة المكتوبة عشان نربط السمع بالبصر
            speak(txt.innerHTML);
        }

        function check(playerAnswer) {
            if (playerAnswer === isCorrectMatch) {
                alert("ممتاز! إجابة ذكية 🌟");
                initGame();
            } else {
                alert("ركز شوية.. أعد المحاولة 🔄");
            }
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'en-US';
                msg.rate = 0.8;
                window.speechSynthesis.speak(msg);
            }
        }

        window.onload = initGame;
    </script>
</body>
</html>
