<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>What's This? Game</title>
    
<!-- PWA Manifest -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4CAF50">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="LangGames">

<!-- تسجيل Service Worker -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('/service-worker.js')
        .then(function (reg) {
          console.log('✅ Service Worker registered:', reg.scope);
        })
        .catch(function (err) {
          console.log('❌ Service Worker error:', err);
        });
    });
  }
</script>

    <style>
        :root {
            --accent: #e91e63;
            --main: #3f51b5;
            --bg: #f0f4f8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            user-select: none;
        }

        .main-title { color: var(--main); font-size: 1.8rem; margin-bottom: 5px; }
        .sub-title { color: #666; font-size: 1rem; margin-bottom: 20px; }

        /* منطقة السؤال */
        .question-card {
            background: white;
            width: 90%;
            max-width: 350px;
            border-radius: 30px;
            padding: 30px 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
            border: 6px solid #fff;
        }

        .image-box { font-size: 8rem; margin-bottom: 20px; }
        .question-text { font-size: 1.5rem; font-weight: bold; color: #333; }

        /* خيارات الإجابة */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .option-btn {
            background: white;
            border: 3px solid #d1d9e6;
            padding: 20px 10px;
            border-radius: 20px;
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--main);
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }

        .option-btn:active {
            transform: scale(0.9);
            background: var(--main);
            color: white;
            border-color: var(--main);
        }

        .footer-btn {
            margin-top: 40px;
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(233, 30, 99, 0.3);
        }
    </style>
</head>
<body>

    <h1 class="main-title">What's This? 🤔</h1>
    <p class="sub-title">Look at the picture and choose the name</p>

    <div class="question-card">
        <div id="displayImg" class="image-box">🍎</div>
        <div class="question-text">It is a ...</div>
    </div>

    <div class="options-grid" id="optionsGrid">
        </div>

    <button class="footer-btn" onclick="initGame()">Next Question 🔁</button>

    <script>
        const library = [
            { word: 'Apple', img: '🍎' }, { word: 'Cat', img: '🐱' }, { word: 'Dog', img: '🐶' }, { word: 'Car', img: '🚗' },
            { word: 'Boy', img: '👦' }, { word: 'Fish', img: '🐟' }, { word: 'Tree', img: '🌳' }, { word: 'Book', img: '📖' },
            { word: 'Ball', img: '⚽' }, { word: 'House', img: '🏠' }, { word: 'Sun', img: '☀️' }, { word: 'Moon', img: '🌙' },
            { word: 'Bird', img: '🐦' }, { word: 'Milk', img: '🥛' }, { word: 'Egg', img: '🥚' }, { word: 'Cake', img: '🍰' },
            { word: 'Hand', img: '✋' }, { word: 'Eye', img: '👁️' }, { word: 'Foot', img: '🦶' }, { word: 'Nose', img: '👃' },
            { word: 'Lion', img: '🦁' }, { word: 'Monkey', img: '🐒' }, { word: 'Rabbit', img: '🐰' }, { word: 'Bear', img: '🐻' },
            { word: 'Banana', img: '🍌' }, { word: 'Orange', img: '🍊' }, { word: 'Grapes', img: '🍇' }, { word: 'Corn', img: '🌽' },
            { word: 'Plane', img: '✈️' }, { word: 'Bike', img: '🚲' }, { word: 'Bus', img: '🚌' }, { word: 'Ship', img: '🚢' },
            { word: 'Bed', img: '🛏️' }, { word: 'Chair', img: '🪑' }, { word: 'Door', img: '🚪' }, { word: 'Key', img: '🔑' },
            { word: 'Pen', img: '🖊️' }, { word: 'Star', img: '⭐' }, { word: 'Flower', img: '🌸' }, { word: 'Water', img: '💧' }
        ];

        let correctWord = "";

        function initGame() {
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';

            // اختيار عشوائي
            const target = library[Math.floor(Math.random() * library.length)];
            correctWord = target.word;
            document.getElementById('displayImg').innerText = target.img;

            // نطق السؤال بصوت هادئ
            speak("What is this?");

            // تجهيز 4 خيارات
            let choices = [correctWord];
            while(choices.length < 4) {
                let rand = library[Math.floor(Math.random() * library.length)].word;
                if(!choices.includes(rand)) choices.push(rand);
            }
            choices.sort(() => 0.5 - Math.random());

            // إنشاء الأزرار
            choices.forEach(word => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.innerText = word;
                btn.onclick = () => checkAnswer(word);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(selected) {
            if (selected === correctWord) {
                alert("Correct! Well done 🌟");
                initGame();
            } else {
                alert("Try again! Look at the picture 🔄");
            }
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'en-US';
                msg.rate = 0.8;
                window.speechSynthesis.speak(msg);
            }
        }

        window.onload = initGame;
    </script>
</body>
</html>
